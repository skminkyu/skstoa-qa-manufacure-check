<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SK스토아 제조사 QA 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

/* ── 상단바 ── */
.topbar{background:#0f2547;color:#fff;padding:11px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-family:'DM Serif Display',serif;font-size:17px;color:#e8c872;cursor:pointer;user-select:none;}
.tb-btns{display:flex;gap:6px;margin-left:auto;}
.tb-btn{background:none;border:1px solid rgba(255,255,255,.25);color:#cfd8dc;padding:5px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:.2s;}
.tb-btn:hover,.tb-btn.on{background:#e8c872;border-color:#e8c872;color:#0f2547;font-weight:600;}

/* ── 공유 안내 ── */
.shared-notice{padding:8px 14px;font-size:12px;margin:12px 16px 0;border-radius:8px;display:flex;align-items:center;gap:6px;}
.notice-ok{background:#e3f2fd;border:1px solid #90caf9;color:#1565c0;}
.notice-warn{background:#fff3e0;border:1px solid #ffcc02;color:#e65100;}

/* ── 홈 ── */
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 100px);padding:40px 20px;}
.home h1{font-family:'DM Serif Display',serif;font-size:28px;color:#0f2547;margin-bottom:8px;text-align:center;}
.home p{font-size:13px;color:#546e7a;margin-bottom:36px;text-align:center;}
.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.card{background:#fff;border:2px solid #e0e4ea;border-radius:14px;padding:26px 22px;width:190px;text-align:center;cursor:pointer;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.card:hover{border-color:#0f2547;transform:translateY(-3px);box-shadow:0 8px 20px rgba(15,37,71,.13);}
.card-icon{font-size:30px;margin-bottom:10px;}
.card-label{font-weight:600;font-size:13px;}
.card-sub{font-size:11px;color:#78909c;margin-top:4px;}

/* ── 체크리스트 wrap ── */
.wrap{max-width:1060px;margin:0 auto;padding:18px 16px 60px;}
.hcard{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.htitle{font-family:'DM Serif Display',serif;font-size:17px;color:#0f2547;margin-bottom:3px;}
.href{font-size:11px;color:#90a4ae;margin-bottom:14px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff label{font-size:11px;font-weight:500;color:#546e7a;letter-spacing:.4px;}
.ff input,.ff select{border:1px solid #cfd8dc;border-radius:7px;padding:7px 10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:.2s;background:#fff;color:#1a1a2e;}
.ff input:focus,.ff select:focus{border-color:#0f2547;}
.ff input[readonly]{background:#f5f5f5;}
.sbar{background:#e8eaf6;border-radius:9px;padding:12px 16px;margin-top:12px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.si{display:flex;flex-direction:column;align-items:center;gap:2px;}
.sv{font-size:20px;font-weight:700;color:#0f2547;}
.sl{font-size:10px;color:#78909c;letter-spacing:.4px;}

/* -- 등급 배지 -- */
.grade-badge{display:inline-flex;flex-direction:column;align-items:center;gap:2px;}
.grade-letter{font-size:26px;font-weight:700;line-height:1;}
.grade-pct{font-size:10px;opacity:.8;}
.grade-s{color:#7B1FA2;font-style:italic;} .grade-a{color:#1565c0;} .grade-b{color:#2e7d32;} .grade-c{color:#f57f17;} .grade-d{color:#c62828;}
.sbadge{padding:3px 13px;border-radius:18px;font-size:12px;font-weight:600;}
.ok{background:#e8f5e9;color:#2e7d32;}
.ng{background:#ffebee;color:#c62828;}
.cond{background:#fff8e1;color:#f57f17;}

/* ── 액션바 & 버튼 ── */
.abar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.btn{border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px;}
.btn-dark{background:#0f2547;color:#fff;}
.btn-dark:hover{background:#1a3a6e;}
.btn-gold{background:#e8c872;color:#0f2547;font-weight:700;}
.btn-gold:hover{background:#d4a800;}
.btn-ol{background:#fff;color:#0f2547;border:2px solid #0f2547;}
.btn-ol:hover{background:#0f2547;color:#fff;}
.btn-sm{background:#fff;color:#c62828;border:1px solid #c62828;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s;position:absolute;top:10px;right:12px;}
.btn-sm:hover{background:#c62828;color:#fff;}
.btn-refresh{background:#fff;color:#1565c0;border:1px solid #90caf9;border-radius:7px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s;}
.btn-refresh:hover{background:#e3f2fd;}

/* ── 섹션 테이블 ── */
.scard{background:#fff;border-radius:11px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.shead{background:#0f2547;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.shead-t{font-weight:600;font-size:13px;}
.shead-s{font-size:11px;color:#90caf9;margin-left:6px;}
.shead-sc{font-size:12px;color:#e8c872;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{background:#e8eaf6;font-size:10px;font-weight:600;color:#546e7a;padding:6px 10px;text-align:left;letter-spacing:.4px;border-bottom:1px solid #c5cae9;}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #f0f2f5;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8f9ff;}
.c조항{width:14%;color:#546e7a;font-size:11px;}
.c항목{width:13%;font-weight:500;}
.c내용{line-height:1.5;color:#37474f;}
.c배점{width:6%;text-align:center;}
.c판정{width:7%;text-align:center;}
.c득점{width:6%;text-align:center;font-weight:600;color:#0f2547;}
.c비고{width:17%;}
.필수badge{font-size:9px;background:#fff3e0;color:#e65100;border-radius:3px;padding:1px 4px;margin-left:3px;font-weight:700;}
.sinput{width:48px;text-align:center;border:1px solid #b0bec5;border-radius:5px;padding:3px 4px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:#e3f2fd;color:#1a1a2e;}
.sinput.bp{background:#fff9c4;}
.sinput:focus{outline:none;border-color:#1565c0;}
.sinput[readonly]{opacity:.65;cursor:default;}
.noteinput{width:100%;border:1px solid #e0e0e0;border-radius:5px;padding:3px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;resize:none;background:#fff;color:#1a1a2e;}
.noteinput:focus{outline:none;border-color:#90a4ae;}
.total-bar{background:#0f2547;color:#fff;border-radius:11px;padding:13px 16px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
.tl{font-weight:700;font-size:14px;}
.tr{font-size:15px;font-weight:700;color:#e8c872;}

/* ── 기록 목록 ── */
.rwrap{max-width:860px;margin:0 auto;padding:18px 16px 60px;}
.rtitle{font-family:'DM Serif Display',serif;font-size:24px;color:#0f2547;margin-bottom:4px;}
.rsub{font-size:12px;color:#78909c;margin-bottom:16px;}
.rcard{background:#fff;border:2px solid #e0e4ea;border-radius:11px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.2s;position:relative;}
.rcard:hover{border-color:#0f2547;box-shadow:0 4px 14px rgba(15,37,71,.12);}
.rmeta{flex:1;}
.rtl{font-weight:600;font-size:13px;margin-bottom:2px;}
.rinfo{font-size:11px;color:#78909c;}
.rdate{font-size:10px;color:#b0bec5;margin-top:2px;}
.rscore{text-align:right;}
.rpct{font-size:19px;font-weight:700;color:#0f2547;}
.rpts{font-size:11px;color:#78909c;}
.empty{text-align:center;padding:60px 20px;color:#90a4ae;}

/* ── 설정 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal h2{font-family:'DM Serif Display',serif;font-size:20px;color:#0f2547;margin-bottom:6px;}
.modal p{font-size:12px;color:#546e7a;margin-bottom:20px;line-height:1.6;}
.modal .ff{margin-bottom:12px;}
.modal .ff label{font-size:12px;font-weight:600;color:#37474f;margin-bottom:4px;display:block;}
.modal .ff input{width:100%;border:1px solid #cfd8dc;border-radius:7px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.modal .ff input:focus{border-color:#0f2547;}
.step-box{background:#f8f9ff;border:1px solid #c5cae9;border-radius:8px;padding:14px;margin-bottom:16px;font-size:12px;color:#37474f;line-height:1.8;}
.step-box b{color:#0f2547;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:22px;right:22px;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.22);animation:tin .25s ease;}
@keyframes tin{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:150;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0f2547;font-weight:600;}


/* ── 검색 필터 ── */
.search-box{background:#fff;border-radius:11px;padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.search-title{font-size:12px;font-weight:600;color:#546e7a;letter-spacing:.4px;margin-bottom:12px;}
.search-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:10px;}
.search-grid-wide{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 16px;margin-bottom:10px;}
.sf{display:flex;flex-direction:column;gap:3px;}
.sf label{font-size:11px;font-weight:500;color:#546e7a;letter-spacing:.3px;}
.sf input,.sf select{border:1px solid #cfd8dc;border-radius:7px;padding:6px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:.2s;background:#fff;color:#1a1a2e;}
.sf input:focus,.sf select:focus{border-color:#0f2547;}
.date-range{display:flex;align-items:center;gap:6px;}
.date-range input{flex:1;}
.date-range span{font-size:11px;color:#90a4ae;white-space:nowrap;}
.search-btns{display:flex;gap:8px;margin-top:12px;}
.btn-search{background:#0f2547;color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:.2s;}
.btn-search:hover{background:#1a3a6e;}
.btn-reset{background:#fff;color:#546e7a;border:1px solid #cfd8dc;border-radius:7px;padding:7px 14px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:.2s;}
.btn-reset:hover{background:#f5f5f5;}
.search-result-info{font-size:12px;color:#546e7a;margin-bottom:12px;padding:8px 12px;background:#e8eaf6;border-radius:7px;display:flex;align-items:center;gap:6px;}
.chip-filter{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{background:#e8eaf6;color:#3949ab;border-radius:12px;padding:2px 10px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.chip:hover{background:#c5cae9;}
.chip.active{background:#0f2547;color:#e8c872;}
/* ── 부적합 요약 ── */
.summary-card{background:#fff;border-radius:11px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #c62828;}
.summary-head{background:#fff3e0;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ffe0b2;}
.summary-head-title{font-weight:600;font-size:13px;color:#bf360c;}
.summary-head-count{font-size:11px;color:#e65100;background:#ffccbc;padding:2px 8px;border-radius:10px;}
.summary-empty{padding:14px;font-size:12px;color:#78909c;text-align:center;}
.summary-table{width:100%;border-collapse:collapse;}
.summary-table th{background:#fff8e1;font-size:10px;font-weight:600;color:#bf360c;padding:6px 10px;text-align:left;letter-spacing:.4px;border-bottom:1px solid #ffe0b2;}
.summary-table td{padding:8px 10px;font-size:12px;border-bottom:1px solid #fff3e0;vertical-align:middle;}
.summary-table tr:last-child td{border-bottom:none;}
.summary-table tr:hover td{background:#fffde7;}
.sum-no{width:4%;color:#546e7a;font-size:11px;text-align:center;}
.sum-section{width:18%;color:#546e7a;font-size:11px;}
.sum-조항{width:16%;color:#546e7a;font-size:11px;}
.sum-항목{width:13%;font-weight:500;color:#bf360c;}
.sum-score{width:10%;text-align:center;}
.sum-score-chip{display:inline-block;background:#ffebee;color:#c62828;border-radius:5px;padding:1px 7px;font-size:11px;font-weight:600;}
.sum-note{color:#37474f;line-height:1.5;}

/* ── 인쇄 ── */
.etc-card{background:#fff;border-radius:11px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.etc-head{background:#37474f;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.etc-head-title{font-weight:600;font-size:13px;}
.etc-body{padding:16px;}
.etc-textarea{width:100%;min-height:160px;border:1px solid #cfd8dc;border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:vertical;outline:none;line-height:1.7;color:#1a1a2e;background:#fff;}
.etc-textarea:focus{border-color:#0f2547;box-shadow:0 0 0 2px rgba(15,37,71,.08);}
/* ── 등급 기준표 ── */
.grade-guide{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:4px solid #0f2547;}
.grade-guide-title{font-size:12px;font-weight:700;color:#0f2547;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.grade-guide-tables{display:flex;gap:16px;flex-wrap:wrap;}
.grade-guide-block{flex:1;min-width:200px;}
.grade-guide-block h4{font-size:11px;font-weight:700;color:#546e7a;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e0e4ea;}
.grade-guide-block table{width:100%;border-collapse:collapse;font-size:11px;}
.grade-guide-block th{background:#0f2547;color:#fff;padding:4px 8px;text-align:center;font-weight:600;}
.grade-guide-block td{padding:4px 8px;border-bottom:1px solid #f0f2f5;text-align:center;}
.grade-guide-block tr:last-child td{border-bottom:none;}
.gg-s{color:#7B1FA2;font-weight:800;font-size:13px;}
.gg-a{color:#1565c0;font-weight:800;font-size:13px;}
.gg-b{color:#2e7d32;font-weight:800;font-size:13px;}
.gg-c{color:#f57f17;font-weight:800;font-size:13px;}
.gg-d{color:#c62828;font-weight:800;font-size:13px;}
.gg-ok{background:#e8f5e9;color:#2e7d32;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;}
.gg-cond{background:#fff8e1;color:#f57f17;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;}
.gg-ng{background:#ffebee;color:#c62828;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;}

@media print{
  .topbar,.abar,.shared-notice,.modal-bg,button,.modal,.grade-guide{display:none!important;}
  body{background:#fff;}
  .scard{page-break-inside:avoid;box-shadow:none;border:1px solid #ddd;}
  .shead{background:#0f2547!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .total-bar{background:#0f2547!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<body>
<div id="app"></div>
<div id="toast-el" class="toast" style="display:none"></div>
<div id="loading" class="loading-overlay" style="display:none">⏳ 저장 중...</div>

<script>
/* ════════════════════════════════════════
   데이터
════════════════════════════════════════ */
const CGMP_DATA=[
  {id:"s1",title:"1. 인적자원",sub:null,items:[
    {id:"c1_1",조항:"1",항목:"조직의 구성",내용:"가. 제조소 별로 독립된 제조부서와 품질부서가 있는가?\n나. 품질책임자가 모든 문서와 절차를 검토하며 승인하는가?",배점:2},
    {id:"c1_2",조항:"2",항목:"연간 계획",내용:"가. 교육훈련의 내용 및 평가가 포함된 교육훈련 규정이 작성되어 있는가?\n나. 연간 교육계획을 수립하였는가?\n다. 연간 교육계획에 따라 모든 직원들이 정기적으로 교육을 받고 있는가?",배점:2},
    {id:"c1_3",조항:"3",항목:"위생 기준",내용:"적절한 위생관리 기준 및 절차가 마련되고, 이를 준수하고 있는가?",배점:3},
    {id:"c1_4",조항:"4",항목:"작업복 착용",내용:"작업소 및 보관소 내의 모든 직원들은 규정된 작업복을 착용하고 있는가?",배점:2},
    {id:"c1_5",조항:"5",항목:"출입 제한",내용:"제조구역별 접근권한이 없는 작업원 및 방문객은 가급적 출입을 제한한 규정과 질병에 걸린 직원이 작업에 참여하지 못하게 하는 규정이 있는가?",배점:1},
  ]},
  {id:"s2",title:"2. 제조",sub:"제1절 시설기준",items:[
    {id:"c2_1",조항:"6",항목:"구획/구분",내용:"제조하는 화장품의 종류 및 제형에 따라 적절히 구획, 구분 되어 있어 교차오염 우려가 없는가?",배점:3},
    {id:"c2_2",조항:"7",항목:"내부 마감 및 표면 설계",내용:"가. 바닥, 벽, 천장은 청소 또는 위생관리를 하기 쉽게 매끄러운 표면을 지니고 청결하게 유지되어야 하며 소독제 등의 부식성에 저항력이 있는가?\n나. 작업소 내의 외관표면은 매끄럽게 설계되고, 청소, 소독제의 부식성에 저항력이 있는 것인가?",배점:2},
    {id:"c2_3",조항:"8",항목:"위생설비 분리",내용:"적절하고 깨끗한 수세실과 화장실을 마련하고 수세실과 화장실은 접근이 쉬워야 하나 생산 구역과 분리되어 있는가?",배점:2},
    {id:"c2_4",조항:"9",항목:"조명 설비",내용:"작업소 전체에 적절한 조명이 설치되고 제품 보호를 위해 조명의 파손시 방지대책이 있는가?",배점:1},
    {id:"c2_5",조항:"10",항목:"공조 및 환기 시설",내용:"제품의 오염을 방지하고 적절한 온도 및 습도를 유지할 수 있는 적절한 환기시설을 갖추고 있는가?",배점:2},
    {id:"c2_6",조항:"11",항목:"세척제 관리",내용:"각 제조구역 별 청소 및 위생관리 절차에 따라 효능이 입증된 세척제 및 소독제를 사용하고 있는가?",배점:1},
    {id:"c2_7",조항:"12",항목:"설비 적합성",내용:"가. 사용목적에 적합하고, 청소가 가능하며, 필요시 위생관리 및 유지관리가 가능한가?\n나. 설비 등은 제품의 오염을 방지하고 배수가 용이하도록 설계, 설치되고 있으며, 제품 및 청소 소독제와 화학반응을 일으키지 않는가?\n다. 설비 등의 위치는 원자재나 직원의 이동으로 인하여 제품의 품질에 영향을 주지 않는가?\n라. 벌크 제품의 용기는 먼지나 수분으로부터 내용물을 보호할 수 있는가?\n마. 시설 및 기구에 사용되는 소모품은 품질에 영향을 주지 않는 것을 사용하는가?",배점:3},
    {id:"c2_8",조항:"13",항목:"방충/방서",내용:"곤충, 해충이나 쥐 등을 막을 수 있는 대책을 마련하고 정기적으로 점검·확인하고 있는가?",배점:3},
    {id:"c2_9",조항:"14",항목:"구역 청결",내용:"생산, 관리 및 보관 구역 내의 바닥, 벽, 천장 및 창문은 항상 청결하게 유지되고 있는가?",배점:3},
    {id:"c2_10",조항:"15",항목:"정기 점검",내용:"가. 제조시설이나 설비는 정기적으로 청소하고 필요시 위생관리 프로그램을 운영하고 있는가?\n나. 건물, 시설 및 주요설비를 정기적으로 점검하여 화장품의 제조 및 품질관리에 지장이 없도록 유지, 관리, 기록하고 있는가?\n다. 세척한 설비는 다음 사용까지 오염되지 않도록 관리하고 있는가?",배점:3},
    {id:"c2_11",조항:"16",항목:"검교정",내용:"제품의 품질에 영향을 줄 수 있는 검사·측정·시험장비 및 자동화장치는 계획을 수립하여 정기적으로 교정 및 성능 점검을 하고 있는가?",배점:3},
  ]},
  {id:"s3",title:"2. 제조",sub:"제2절 원자재의 관리",items:[
    {id:"c3_1",조항:"17",항목:"원자재 입고 검사",내용:"가. 원자재 입고시 구매요구서, 성적서 및 현품이 서로 일치하는지 확인하는 등 절차가 있는가?\n나. 원자재 용기에 제조번호를 표시하고, 제조번호가 없는 경우에는 관리번호를 부여하여 보관하는가?\n다. 원자재 입고시 물품에 결함이 있는 경우 적절한 조치를 취하는가?\n라. 입고된 원자재는 상태(적합, 부적합, 검사중) 표시를 하고 있는가?\n마. 원자재 용기 및 시험기록서에 다음 사항이 기재되어 있는가? (제품명, 원자재 공급자명, 수령일자, 제조번호 또는 관리번호)",배점:3},
    {id:"c3_2",조항:"18",항목:"선입선출",내용:"원자재 시험결과 적합판정된 것만을 선입선출방식으로 출고하고 이를 확인할 수 있는 체계가 확립되어 있는가?",배점:2},
    {id:"c3_3",조항:"19",항목:"보관 조건",내용:"가. 원자재, 반제품 및 벌크 제품은 품질에 나쁜 영향을 미치지 아니하는 조건에서 선입선출에 의하여 출고할 수 있도록 보관하는가?\n나. 원자재, 반제품 및 벌크 제품은 바닥과 벽에 닿지 않도록 보관하고 가능한 선입선출에 의하여 출고할 수 있도록 보관하는가?\n다. 원자재, 시험 중인 제품 및 부적합품은 각각 구획된 장소에서 보관하고 있는가?",배점:3},
    {id:"c3_4",조항:"20",항목:"재평가",내용:"원자재, 반제품 및 벌크 제품의 보관 기간이 지나면 사용 여부에 대한 재평가하는 시스템이 확립되어 있는가?",배점:2},
    {id:"c3_5",조항:"21",항목:"용수 품질 기준 및 검사",내용:"물의 품질 적합기준이 사용 목적에 맞게 규정되어 있으며, 정기적으로 검사하고 있는가?",배점:3},
    {id:"c3_6",조항:"22",항목:"설비 기준",내용:"물 공급 설비는 다음을 만족하는가?\n1) 물의 정체와 오염을 피할 수 있도록 설치될 것\n2) 물의 품질에 영향이 없을 것\n3) 살균처리가 가능할 것",배점:3},
  ]},
  {id:"s4",title:"2. 제조",sub:"제3절 제조관리",items:[
    {id:"c4_1",조항:"23",항목:"제품표준서",내용:"제품표준서는 품목별로 다음 각 호의 사항이 포함되어 작성하여 구비하고 있는가? 1)제품명 2)작성연월일 3)효능·효과 및 주의사항 4)원료명·분량·기준량 5)공정별 작업내용 및 흐름도 6)작업 중 주의사항 7)기준 및 시험방법 8)시설 및 기기 9)보관조건 10)사용기한 11)변경이력",배점:3},
    {id:"c4_2",조항:"24",항목:"제조관리기준서",내용:"제조관리기준서에 다음 사항이 포함되어 작성하여 구비하고 있는가? 1)제조공정관리 2)시설 및 기기 관리 3)원자재, 반제품 및 제품의 취급 4)작업원의 위생 관리 5)보관 관리 6)검체의 채취 및 관리",배점:3},
    {id:"c4_3",조항:"25",항목:"품질관리기준서",내용:"다음 사항이 포함된 품질관리기준서를 작성하여 구비하고 있는가?\n1) 시험검체 채취방법\n2) 시험시설 및 시험기구의 점검\n3) 안정성시험\n4) 보관용 검체의 관리\n5) 표준품 및 시약의 관리\n6) 위탁시험 또는 위탁제조",배점:2},
    {id:"c4_4",조항:"26",항목:"위생관리기준서",내용:"다음 사항이 포함된 위생관리기준서를 작성하여 구비하고 있는가?\n1) 작업원의 건강 관리\n2) 작업원의 수세, 소독 방법\n3) 작업복장의 규격\n4) 작업실 등의 청소\n5) 청소상태의 평가방법\n6) 제조시설의 세척 및 평가\n7) 방충, 방서 방법",배점:2},
    {id:"c4_5",조항:"27",항목:"칭량 관리",내용:"가. 원료를 품질에 영향을 미치지 않는 용기나 설비에 정확하게 칭량하고 있는가?\n나. 칭량지시기록서를 품목별로 작성하고, 기재된 내용에 따라 칭량이 이루어지고 있는가?\n다. 칭량된 원료에는 품목명, 제조번호, 칭량된 양, 칭량자 등이 기재되어 있는가?",배점:3},
    {id:"c4_6",조항:"28",항목:"제조지시기록서",내용:"가. 제조지시기록서를 품목별로 작성하고, 기재된 내용에 따라 제조가 이루어지고 있는가?\n나. 제조된 내용물(벌크)에는 품목명, 제조번호, 제조량, 제조자 등이 기재되어 있는가?",배점:3},
    {id:"c4_7",조항:"29",항목:"벌크 관리",내용:"가. 벌크 제품은 품질이 변하지 아니하도록 적당한 용기에 넣어 지정된 장소에서 보관하고 있는가?\n나. 벌크 제품의 용기에는 다음 사항이 표시되어 있는가? (명칭 또는 코드, 제조번호, 완료된 공정명, 보관조건)\n다. 벌크 제품의 최대 보관기간이 규정되어 있는가? 최대 보관 기간이 가까워진 벌크 제품은 완제품 제조하기 전에 재평가 하는 절차가 있는가?",배점:3},
    {id:"c4_8",조항:"30",항목:"포장지시서 및 기록서",내용:"가. 포장지시서에 의해 포장작업이 수행되고 있는가?\n나. 포장지시서에는 다음 사항이 포함되어 있는가? (제품명, 포장 설비명, 포장재 리스트, 상세 포장 공정, 포장지시수량, 포장량, 수득률 등)\n다. 포장작업 완료 후 포장지시기록서에 작성되고 있는가?",배점:3},
    {id:"c4_9",조항:"31",항목:"보관 관리",내용:"가. 완제품은 적절한 조건하의 정해진 장소에서 보관되고 주기적으로 완제품의 재고 점검을 수행하고 있는가?\n나. 출고할 제품은 원자재, 부적합품 및 반품된 제품과 구획된 장소에서 보관하고 있는가?",배점:2},
    {id:"c4_10",조항:"32",항목:"출고 승인",내용:"시험결과 적합으로 판정되고 품질책임자가 출고 승인한 것만을 출고하고 있는가?",배점:2},
  ]},
  {id:"s5",title:"3. 품질보증",sub:null,items:[
    {id:"c5_1",조항:"33",항목:"시험기록 유지",내용:"원자재·반제품·벌크 제품·완제품에 대한 적합 기준을 마련하고 제조번호별로 시험 기록을 작성·유지하고 있는가?",배점:3},
    {id:"c5_2",조항:"34",항목:"기준일탈(OOS)",내용:"가. 기준일탈(OOS)이 된 경우에 규정에 따라 책임자에게 보고한 후 원인조사를 실시하고 있는가?\n나. OOS 조사기록에는 발생 원인, 조사 내용, 시정조치 사항이 포함되어 있는가?\n다. 동일 문제의 재발 방지를 위한 조치가 이루어지고 있는가?",배점:3},
    {id:"c5_3",조항:"35",항목:"재작업 절차",내용:"재작업을 하는 경우에는 재작업 절차를 따르고 있는가?",배점:2},
    {id:"c5_4",조항:"36",항목:"폐기 규정",내용:"폐기처리규정이 작성되어 있고, 폐기 대상은 따로 보관하고 규정에 따라 신속하게 폐기하고 있는가?",배점:1},
    {id:"c5_5",조항:"37",항목:"일탈 조사 및 재발방지",내용:"제조 또는 품질관리 중의 일탈에 대해 조사한 후 필요한 조치를 마련하고 일탈의 반복을 방지하기 위한 예방조치를 수립하고 있는가?",배점:2},
    {id:"c5_6",조항:"38",항목:"불만 기록 관리",내용:"불만처리담당자는 모든 불만을 취합하고 신속하게 조사·조치하며 기록·유지하였는가?",배점:2},
    {id:"c5_7",조항:"39",항목:"회수 조치",내용:"결함이 있는 사실을 알게 되었을 때 화장품책임판매업자를 통하여 제품을 회수하거나 회수에 필요한 조치를 할 수 있는 회수체계를 구축하고 있는가?",배점:3},
    {id:"c5_8",조항:"40",항목:"원본 보관 및 보존기간",내용:"원본 문서는 품질부서에서 보관, 사본은 비치·사용하고 있으며, 적절한 보존기간이 규정되어 있는가?",배점:2},
  ]},
];
const HACCP_G=[
  {id:"hg_s1",title:"1. 제조 현장 관리",sub:"영업장 관리",items:[
    {id:"hg_1_1",조항:"1",항목:"작업장 독립성",내용:"작업장은 독립된 건물이거나 식품 취급외의 용도로 사용되는 시설과 분리되어야 한다.",배점:1},
    {id:"hg_1_2",조항:"2",항목:"작업장 밀폐구조",내용:"작업장은 누수, 외부의 오염물질이나 해충·설치류 등의 유입을 차단할 수 있도록 밀폐 가능한 구조이어야 한다.",배점:2},
    {id:"hg_1_3",조항:"3",항목:"구역 분리",내용:"작업장은 청결구역과 일반구역으로 분리하고, 제품의 특성과 공정에 따라 분리, 구획 또는 구분할 수 있다.",배점:2},
    {id:"hg_1_4",조항:"4",항목:"바닥·벽·천장",내용:"원료처리실, 제조·가공실 및 내포장실의 바닥, 벽, 천장, 출입문, 창문 등은 내수성 또는 내열성 등의 재질을 사용하거나 이러한 처리를 하여야 하며 마른 상태를 유지하여야 한다.",배점:2},
    {id:"hg_1_5",조항:"5",항목:"배수 및 배관",내용:"작업장은 배수가 잘 되어야 하고 배수로에 퇴적물이 쌓이지 아니하여야 하며, 배수구, 배수관 등은 역류가 되지 아니하도록 관리하여야 한다.",배점:2},
    {id:"hg_1_6",조항:"6",항목:"출입구 위생설비",내용:"가. 작업장의 출입구에는 구역별 위생복 복장 착용 방법(가운, 모자, 마스크, 장갑 등)이 게시되어 있으며, 이를 준수하고 있는가? 또한, 개인위생관리를 위한 세척, 건조, 소독 설비 등을 구비하여야 한다.\n나. 작업장 출입 시 손 세척·소독, 에어샤워, 점착롤러 등 개인위생관리 절차를 준수하고 있는가?\n다. 에어샤워, 점착롤러, 손 소독기 등 위생관리 설비가 정상적으로 가동되고 있는가?",배점:3},
    {id:"hg_1_7",조항:"7",항목:"통로 관리",내용:"작업장 내부에는 종업원의 이동경로를 표시하여야 하고 이동경로에는 물건을 적재하거나 다른 용도로 사용하지 아니하여야 한다.",배점:2},
    {id:"hg_1_8",조항:"8",항목:"창유리 파손 방지",내용:"창의 유리는 파손 시 유리조각이 작업장내로 흩어지거나 원·부자재 등으로 혼입되지 아니하도록 하여야 한다.",배점:2},
    {id:"hg_1_9",조항:"9",항목:"조명 및 보호장치",내용:"가. 작업실 안은 220룩스 이상을 유지하여야 하고, 특히 선별 및 검사구역은 540룩스 이상을 유지하여야 한다.\n나. 채광 및 조명시설은 내부식성 재질을 사용하여야 하며, 식품이 노출되거나 내포장 작업을 하는 작업장에는 파손이나 이물 낙하 등에 의한 오염을 방지하기 위한 보호장치를 하여야 한다.",배점:2},
    {id:"hg_1_10",조항:"10",항목:"화장실·탈의실 환기",내용:"화장실, 탈의실 등은 내부 공기를 외부로 배출할 수 있는 별도의 환기시설을 갖추어야 하며, 화장실의 출입구에는 세척, 건조, 소독설비 등을 구비하여야 한다.",배점:2},
    {id:"hg_1_11",조항:"11",항목:"탈의실 교차오염 방지",내용:"탈의실은 외출복장(신발 포함)과 위생복장(신발 포함)간의 교차오염이 발생하지 아니하도록 분리 또는 구분·보관하여야 한다.",배점:1}
  ]},
  {id:"hg_s2",title:"1. 제조 현장 관리",sub:"위생관리",items:[
    {id:"hg_2_1",조항:"12",항목:"이동 동선 준수",내용:"원·부자재의 입고에서부터 출고까지 물류 및 종업원의 이동 동선을 설정하고 이를 준수하여야 한다.",배점:2},
    {id:"hg_2_2",조항:"13",항목:"이물 관리 계획",내용:"원료의 입고에서부터 제조·가공, 보관, 운송에 이르기까지 모든 단계에서 혼입될 수 있는 이물에 대한 관리계획을 수립하고 이를 준수하여야 한다.",배점:3},
    {id:"hg_2_3",조항:"14",항목:"온도·습도 관리",내용:"제조·가공·포장·보관 등 공정별로 온도 관리계획을 수립하고 이를 측정할 수 있는 온도계를 설치하여 관리하여야 한다.",배점:2},
    {id:"hg_2_4",조항:"15",항목:"환기시설",내용:"작업장내에서 발생하는 악취나 이취, 유해가스, 매연, 증기 등을 배출할 수 있는 환기시설을 설치하여야 한다.",배점:2},
    {id:"hg_2_5",조항:"16",항목:"흡·배기구 방충망",내용:"외부로 개방된 흡·배기구 등에는 여과망이나 방충망 등을 부착하여야 한다.",배점:2},
    {id:"hg_2_6",조항:"17",항목:"방충·방서 관리",내용:"작업장은 방충·방서관리를 위하여 해충이나 설치류 등의 유입이나 번식을 방지할 수 있도록 관리하여야 하고, 유입 여부 모니터링을 기록 및 관리하여야 한다.",배점:2},
    {id:"hg_2_7",조항:"18",항목:"방충·방서 구제",내용:"작업장내에서 해충이나 설치류 등의 구제를 실시할 경우에는 정해진 위생 수칙에 따라 적절한 보호 조치를 취한 후 실시하여야 한다.",배점:2},
    {id:"hg_2_8",조항:"19",항목:"폐기물 관리",내용:"폐기물·폐수처리시설은 작업장과 격리된 일정장소에 설치·운영하며, 관리계획에 따라 폐기물 등을 처리·반출하고, 그 관리기록을 유지하여야 한다.",배점:1},
    {id:"hg_2_9",조항:"20",항목:"세척·소독 시설 및 기준 (★필수)",내용:"가. 영업장에는 기계·설비, 기구·용기 등을 충분히 세척하거나 소독할 수 있는 시설이나 장비를 갖추어야 한다.\n나(1). 영업자는 종업원, 위생복, 작업장 주변, 작업실별 내부, 식품제조시설, 냉장냉동설비, 용수저장시설, 보관운반시설, 운송차량, 모니터링 및 검사장비, 환기시설, 폐기물처리용기, 세척소독 도구 등에 대한 세척 또는 소독 기준을 정하여야 한다.\n나(2). 세척 또는 소독 기준은 세척 및 소독 부위, 방법 및 주기, 책임자, 기구의 올바른 사용 방법, 세제 및 소독제의 구체적인 사용 방법을 포함하여야 한다.\n다. 소독용 기구나 용기는 정해진 장소에 보관, 관리되어야 한다.",배점:3},
    {id:"hg_2_10",조항:"21",항목:"세척·소독 불출 및 효과 확인 (★필수)",내용:"가. 생산 이후 세척 및 소독하는 세척 소독제의 입고 불출 내역을 기록 관리하여야 한다.\n나. 세척 및 소독의 효과를 확인하고, 정해진 관리계획에 따라 세척 또는 소독을 실시하여야 한다.",배점:3}
  ]},
  {id:"hg_s3",title:"1. 제조 현장 관리",sub:"제조·가공 시설·설비 관리",items:[
    {id:"hg_3_1",조항:"22",항목:"공정 배치",내용:"시설 및 설비 등은 공정간 오염이 발생되지 아니하도록 공정의 흐름에 따라 적절히 배치되어야 한다.",배점:2},
    {id:"hg_3_2",조항:"23",항목:"식품 접촉면 재질",내용:"식품과 접촉하는 취급시설·설비는 인체에 무해한 내수성·내부식성 재질로 소독·살균이 가능하여야 하며, 기구 및 용기류는 용도별로 구분하여 사용·보관하여야 한다.",배점:2},
    {id:"hg_3_3",조항:"24",항목:"온도 측정·기록 및 냉장냉동 온도 관리",내용:"온도를 높이거나 낮추는 처리시설에는 온도변화를 측정·기록하는 장치를 설치·구비하거나 일정한 주기를 정하여 온도를 측정하고, 그 기록을 유지하여야 한다. 냉장시설은 10℃이하, 냉동시설은 -18℃이하로 유지하고, 외부에서 온도변화를 관찰할 수 있어야 한다.",배점:3},
    {id:"hg_3_4",조항:"25",항목:"시설 점검·정비",내용:"식품취급시설·설비는 정기적으로 점검·정비를 하여야 하고 그 결과를 보관하여야 한다.",배점:2},
    {id:"hg_3_5",조항:"26",항목:"용수 적합성 및 검사 (★필수)",내용:"식품 제조·가공에 사용되는 용수는 수돗물이나 먹는물 수질기준에 적합한 지하수이어야 한다. 지하수를 사용하는 경우 연1회 이상 먹는물 수질기준 전항목에 대한 검사를 하여야 하며, 미생물학적 항목에 대하여는 월1회 이상 검사를 실시하여야 한다.",배점:3},
    {id:"hg_3_6",조항:"27",항목:"저수조·배관 관리 및 청소",내용:"저수조, 배관 등은 인체에 유해하지 아니한 재질을 사용하여야 하며, 외부로부터의 오염물질 유입을 방지하는 잠금장치를 설치하여야 하고, 누수 및 오염여부를 정기적으로 점검하여야 한다. 또한 저수조는 반기별 1회 이상 청소와 소독을 실시하고 그 결과를 기록·유지하여야 한다.",배점:2}
  ]},
  {id:"hg_s4",title:"1. 제조 현장 관리",sub:"보관·운송관리",items:[
    {id:"hg_4_1",조항:"28",항목:"원부자재 입고 관리 (★필수)",내용:"검사성적서로 확인하거나 자체적으로 정한 입고기준 및 규격에 적합한 원·부자재만을 구입하여야 한다.",배점:3},
    {id:"hg_4_2",조항:"29",항목:"운송 교차오염 방지 및 온도 관리",내용:"운반 중인 식품·축산물은 비식품·축산물 등과 구분하여 교차오염을 방지하여야 하며, 냉장차량은 10℃이하, 냉동차량은 -18℃이하를 유지하고 온도 기록 장치를 부착하여야 한다.",배점:2},
    {id:"hg_4_3",조항:"30",항목:"원부자재 구분 보관",내용:"원·부자재, 반제품 및 완제품은 구분관리 하고, 바닥이나 벽에 밀착되지 아니하도록 적재·관리하여야 한다.",배점:2},
    {id:"hg_4_4",조항:"31",항목:"부적합품 보관",내용:"부적합한 원·부자재, 반제품 및 완제품은 별도의 지정된 장소에 보관하고 명확하게 식별되는 표식을 하여 반송, 폐기 등의 조치를 취한 후 그 결과를 기록·유지하여야 한다.",배점:2}
  ]},
  {id:"hg_s5",title:"1. 제조 현장 관리",sub:"검사관리",items:[
    {id:"hg_5_1",조항:"32",항목:"제품검사 실시 및 기록",내용:"제품검사는 자체 실험실에서 검사계획에 따라 실시하거나 검사기관과의 협약에 의하여 실시하여야 한다. 검사결과에는 검체명, 제조년월일 또는 소비기한, 검사 년월일, 검사항목·검사기준 및 검사결과, 판정결과 및 판정년월일, 검사자 및 판정자의 서명날인 등이 구체적으로 기록되어야 한다. ※ 자가품질검사 주기 기준 준수 확인",배점:3},
    {id:"hg_5_2",조항:"33",항목:"측정장치 교정",내용:"냉장·냉동 및 가열처리 시설 등의 온도측정 장치는 연 1회 이상, 검사용 장비 및 기구는 정기적으로 교정하여야 한다.",배점:3}
  ]},

function calcScores(sections,J){
  let total=0,earned=0;
  sections.forEach(function(s){s.items.forEach(function(it){
    var bp=getBp(it,J);
    var v=(J||{})[it.id];
    /* 배점 자체가 N/A (용수관리 등 na가능 항목) → 완전 제외 */
    if((J||{})[it.id+'_bp']==='N/A'){return;}
    if(v==='N/A'){return;} /* 판정 N/A: 총배점에서 제외 */
    total+=bp;
    if(v!==undefined&&v!=='') earned+=Math.min(Number(v),bp);
  });});
  return{total,earned};
}
function pct(e,t){return t?((e/t)*100).toFixed(1):"0.0";}
function grade(e,t,type){
  if(!t)return"-";
  if(type==="cgmp"){
    if(e>=90)return"S"; if(e>=80)return"A"; if(e>=71)return"B"; if(e>=61)return"C"; return"D";
  }
  if(type==="haccp_g"){
    if(e>=104)return"S"; if(e>=92)return"A"; if(e>=81)return"B"; if(e>=69)return"C"; return"D";
  }
  if(type==="haccp_s"){
    if(t<=30){ /* 용수관리 N/A → 만점30 */
      if(e>=27)return"S"; if(e>=24)return"A"; if(e>=21)return"B"; if(e>=18)return"C"; return"D";
    } else {  /* 만점33 */
      if(e>=30)return"S"; if(e>=26)return"A"; if(e>=23)return"B"; if(e>=20)return"C"; return"D";
    }
  }
  const p=(e/t)*100;
  if(p>=90)return"A"; if(p>=80)return"B"; if(p>=70)return"C"; return"D";
}

function gradeCls(g){
  return g==="S"?"grade-s":g==="A"?"grade-a":g==="B"?"grade-b":g==="C"?"grade-c":g==="D"?"grade-d":"";
}
function judge(e,t,type){
  if(!t)return"-";
  if(type==="cgmp"){
    if(e>=90)return"적합";
    if(e>=61)return"조건부 적합";
    return"부적합";
  }
  if(type==="haccp_g"){
    if(e>=104)return"적합";
    if(e>=69)return"조건부 적합";
    return"부적합";
  }
  /* haccp_s는 적합여부 미사용, 기타 타입 기본값 */
  const p=(e/t)*100;
  if(p>=90)return"적합";
  if(p>=70)return"조건부 적합";
  return"부적합";
}

  try{
    const lCtrl=new AbortController();
    const lTimer=setTimeout(()=>lCtrl.abort(),8000);
    let r;
    try{
      r=await fetch("https://api.jsonbin.io/v3/b/"+cfg.binId+"/latest",{
        headers:{"X-Master-Key":cfg.masterKey},
        signal:lCtrl.signal
      });
    }finally{clearTimeout(lTimer);}
    if(r.status===404) return null;
    if(!r.ok){console.warn("cloudLoad error",r.status);return null;}
    const d=await r.json();
    if(!d||d.record===undefined||d.record===null) return null;
    /* 여러 형식 대응: 직접 배열 / {records:[...]} 래핑 / 객체값 배열 변환 */
    let arr=null;
    const raw=d.record;
    if(Array.isArray(raw)){
      arr=raw;
    } else if(raw&&typeof raw==="object"){
      if(Array.isArray(raw.records)) arr=raw.records;
      else{
        const vals=Object.values(raw);
        if(vals.length>0&&vals.every(v=>v&&typeof v==="object"&&v.id)) arr=vals;
      }
    }
    if(!arr){console.warn("cloudLoad: 알 수 없는 데이터 형식",JSON.stringify(raw).slice(0,200));arr=[];}
    else console.log("cloudLoad: "+arr.length+"건 로드 완료");
    if(arr.length>0) saveBackup(arr);
    return arr;
  }catch(e){
    console.warn("cloudLoad exception",e);
    return null;
  }
}

async function cloudSave(records){
  if(!Array.isArray(records)||records.length===0){
    console.warn("cloudSave: 빈 배열 저장 차단");
    return false;
  }
  if(!isConfigured())return false;
  try{
    /* 8초 타임아웃 - JSONBin 접속 불가 시 무한 대기 방지 */
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    let r;
    try{
      r=await fetch("https://api.jsonbin.io/v3/b/"+cfg.binId,{
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":cfg.masterKey},
        body:JSON.stringify(records),
        signal:ctrl.signal
      });
    }finally{clearTimeout(timer);}
    return r.ok;
  }catch(e){
    if(e.name==="AbortError"){
      showToast("⚠️ 저장 시간 초과 (JSONBin 서버 응답 없음). 나중에 다시 시도하세요.",false);
    }
    return false;
  }
}

/* ── 부적합 요약 렌더 ── */
function renderSummary(sections, J){
  const items=[];
  sections.forEach(sec=>{
    sec.items.forEach(it=>{
      const bp=Number(J[it.id+"_bp"]??it.배점)||0;
      const v=J[it.id];
      const note=J[it.id+"_note"]||"";
      if(bp===0) return;
      const score=(v!==undefined&&v!=="")?Math.min(Number(v),bp):null;
      // 배점 미달 AND 비고 있는 항목 수집
      if(score!==null && score<bp && note.trim()){
        items.push({sec, it, bp, score, note});
      }
    });
  });
  const count=items.length;
  return `<div class="summary-card">
    <div class="summary-head">
      <span class="summary-head-title">📋 주요 부적합 사항 요약</span>
      ${count>0?`<span class="summary-head-count">총 ${count}건</span>`:""}
    </div>
    ${count===0
      ?`<div class="summary-empty">※ 비고가 기재된 부적합 항목이 없습니다.</div>`
      :`<table class="summary-table">
        <thead><tr>
          <th class="sum-no">No.</th>
          <th class="sum-section">섹션</th>
          <th class="sum-조항">조항</th>
          <th class="sum-항목">평가 항목</th>
          <th class="sum-score">배점/득점</th>
          <th class="sum-note">부적합 내용 (비고)</th>
        </tr></thead>
        <tbody>
        ${items.map((r,i)=>`<tr>
          <td class="sum-no">${i+1}</td>
          <td class="sum-section">${esc(r.sec.title)}${r.sec.sub?`<br><span style="color:#90a4ae;font-size:10px">${esc(r.sec.sub)}</span>`:""}</td>
          <td class="sum-조항">${esc(r.it.조항)}</td>
          <td class="sum-항목">${esc(r.it.항목)}${r.it.필수?`<span class="필수badge">★필수</span>`:""}</td>
          <td class="sum-score"><span class="sum-score-chip">${r.score} / ${r.bp}점</span></td>
          <td class="sum-note">${esc(r.note)}</td>
        </tr>`).join("")}
        </tbody>
      </table>`
    }
  </div>`;
}

/* ── 섹션 테이블 렌더 ── */
function renderSection(sec,J,ro,bpMode){
  var isDropdown=(bpMode==='dropdown'||bpMode==='cgmp_fixed'), isBigoOnly=(bpMode==='비고만');
  var q=String.fromCharCode(39);
  var isCgmpFixed=(bpMode==='cgmp_fixed'||bpMode==='hg_fixed'||bpMode==='hs_fixed');
  var sbp=function(it){
    /* na가능 항목: J에 저장된 배점값 우선 (N/A 또는 숫자) */
    if(it.na가능){
      var s=J[it.id+'_bp'];
      if(s==='N/A') return 0;
      if(s!==undefined&&s!=='') return Number(s);
      return Number(it.배점)||0;
    }
    /* 고정배점 모드: 데이터의 배점 사용 */
    if(isCgmpFixed&&it.배점!==null&&it.배점!==undefined)return Number(it.배점);
    var s=J[it.id+'_bp'];
    if(s!==undefined&&s!=='')return Number(s);
    if(!isDropdown&&it.배점!==null&&it.배점!==undefined)return Number(it.배점);
    return 0;
  };
  const secMax=isBigoOnly?0:sec.items.reduce((a,it)=>a+sbp(it),0);
  const secE=isBigoOnly?0:sec.items.reduce((a,it)=>{
    const v=J[it.id],bp=sbp(it);
    return a+(v!==undefined&&v!==""?Math.min(Number(v),bp):0);
  },0);
  return `<div class="scard">
    <div class="shead">
      <div><span class="shead-t">${sec.title}</span>${sec.sub?`<span class="shead-s"> · ${sec.sub}</span>`:""}</div>
      ${isBigoOnly?"":'<div class="shead-sc">소계: '+secE+' / '+secMax+'점</div>'}
    </div>
    <table>
      <thead><tr>
        <th class="c조항">순번</th><th class="c항목">평가 항목</th><th class="c내용">평가 내용</th>
        ${isBigoOnly?"":"<th class=\"c배점\">배점</th><th class=\"c판정\">판정</th><th class=\"c득점\">득점</th>"}
        <th class="c비고">비고</th>
      </tr></thead>
      <tbody>
      ${sec.items.map(it=>{
        var bp=sbp(it), v=J[it.id];
        var score=(v!==undefined&&v!=='')?Math.min(Number(v),bp):null;
        var bpS=J[it.id+'_bp'], bpD=(bpS!==undefined&&bpS!=='')?bpS:(isDropdown?'':it.배점);
        var note=J[it.id+'_note']||'';
        var dropOpts=['N/A',0,1,2,3,4,5];
        var bpCell='',judgeCell='',scoreCell='';
        if(!isBigoOnly){
          if(isCgmpFixed&&it.na가능){
            /* na가능 항목 (용수관리): 배점 N/A|3 선택, 판정 N/A|0~3 선택 */
            var curBp=J[it.id+'_bp'];
            var bpOpts=['N/A',it.배점];
            bpCell=ro?'<span style="font-size:13px;font-weight:700;color:#0f2547;background:#fff9c4;padding:2px 6px;border-radius:4px">'+(curBp!==undefined&&curBp!==''?curBp:it.배점)+'</span>':
              '<select class="sinput bp" style="width:58px;padding:2px;background:#fff9c4" onchange="setJ('+q+it.id+'_bp'+q+',this.value)">'+
              bpOpts.map(function(o){return'<option value="'+o+'"'+(String(curBp===undefined||curBp===''?it.배점:curBp)===String(o)?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
            var judgeOpts2=['N/A'];
            for(var jn2=0;jn2<=it.배점;jn2++) judgeOpts2.push(jn2);
            judgeCell=ro?'<span style="font-size:12px;font-weight:600;color:#0f2547">'+(v!==''&&v!==undefined?v:'-')+'</span>':
              '<select class="sinput" style="width:58px;padding:2px"'+(curBp==='N/A'?' disabled':'')+' onchange="setJ('+q+it.id+q+',this.value)">'+
              '<option value="">선택</option>'+judgeOpts2.map(function(o){return'<option value="'+o+'"'+(String(v??'')===String(o)?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
          } else if(isCgmpFixed){
            /* 화장품/식품/농축수산물: 배점 고정 표시, 판정만 드롭박스 (0~배점값) */
            bpCell='<span style="font-size:13px;font-weight:700;color:#0f2547;background:#fff9c4;padding:2px 6px;border-radius:4px">'+bp+'</span>';
            var judgeOpts=['N/A'];
            for(var jn=0;jn<=bp;jn++) judgeOpts.push(jn);
            judgeCell=ro?'<span style="font-size:12px;font-weight:600;color:#0f2547">'+(v!==''&&v!==undefined?v:'-')+'</span>':
              '<select class="sinput" style="width:58px;padding:2px" onchange="setJ('+q+it.id+q+',this.value)">'+
              '<option value="">선택</option>'+judgeOpts.map(function(o){return'<option value="'+o+'"'+(String(v??'')===String(o)?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
          } else if(isDropdown){
            bpCell=ro?'<span style="font-size:12px;font-weight:600;color:#0f2547">'+(bpD!==''&&bpD!==undefined?bpD:'-')+'</span>':
              '<select class="sinput bp" style="width:54px;padding:2px;background:#fff9c4" onchange="setJ('+q+it.id+'_bp'+q+',this.value)">'+
              '<option value="">선택</option>'+dropOpts.map(function(o){return'<option value="'+o+'"'+(String(bpD)===String(o)?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
            judgeCell=ro?'<span style="font-size:12px;font-weight:600;color:#0f2547">'+(v!==''&&v!==undefined?v:'-')+'</span>':
              '<select class="sinput" style="width:54px;padding:2px" onchange="setJ('+q+it.id+q+',this.value)">'+
              '<option value="">선택</option>'+dropOpts.map(function(o){return'<option value="'+o+'"'+(String(v??'')===String(o)?' selected':'')+'>'+o+'</option>';}).join('')+'</select>';
          } else {
            bpCell=ro?'<input class="sinput bp" value="'+(bpD||'')+'" readonly/>':'<input class="sinput bp" type="number" min="0" max="99" value="'+(bpD||'')+'" oninput="setJ('+q+it.id+'_bp'+q+',this.value)"/>';
            judgeCell=ro?'<input class="sinput" value="'+(v||'')+'" readonly/>':'<input class="sinput" type="number" min="0" max="'+bp+'" value="'+(v||'')+'" oninput="setJ('+q+it.id+q+',this.value)"/>';
          }
          scoreCell=score!==null?score:'-';
        }
        var noteCell=ro
          ?'<span style="font-size:11px;color:#546e7a">'+esc(note)+'</span>'
          :'<textarea class="noteinput" rows="1" data-note-id="'+it.id+'">'+esc(note)+'</textarea>';
        return '<tr>'
          +'<td class="c조항">'+(++_renderRowNo)+'</td>'
          +'<td class="c항목">'+formatItemName(it.항목)+'</td>'
          +'<td class="c내용">'+esc(it.내용).replace(/\n/g,'<br>')+'</td>'
          +(isBigoOnly?'':'<td class="c배점">'+bpCell+'</td><td class="c판정">'+judgeCell+'</td><td class="c득점">'+scoreCell+'</td>')
          +'<td class="c비고"'+(isBigoOnly?' style="width:30%"':'')+'>'+noteCell+'</td>'
          +'</tr>';
      }).join("")}
      </tbody>
    </table>
  </div>`;
}

/* 항목명 특수 포맷: (★필수)→빨간 줄바꿈, (세척이 있는 경우에 해당)→회색 소폰트 */
function formatItemName(name){
  if(!name) return '';
  /* ★필수 패턴 */
  var res = name.replace(/\s*\((★[^)]+)\)/g, function(_,tag){
    return '<br><span style="color:#c62828;font-size:10px;font-weight:700">'+esc(tag)+'</span>';
  });
  /* (세척이 있는 경우에 해당) 패턴 */
  res = res.replace(/\s*\(([^)]*경우[^)]*)\)/g, function(_,txt){
    return '<br><span style="color:#78909c;font-size:10px">('+ esc(txt) +')</span>';
  });
  return res;
}

async function doSave(){
  if(!isConfigured()){
    showToast("⚠️ 공유 저장소가 설정되지 않았습니다. ⚙️ 설정 버튼을 눌러주세요.",false);
    return;
  }
  const ct=TYPES[S.clType];
  const{total,earned}=calcScores(ct.data,S.J);
  var existId=(S.editIdx!==null&&S.records[S.editIdx])?S.records[S.editIdx].id:Date.now();
  const rec={id:existId,clType:S.clType,header:{...S.header},J:{...S.J},total,earned,savedAt:new Date().toISOString()};

  setLoading(true);

  /* 최대 3회 재시도: 로드→병합→저장→검증 */
  for(let attempt=1;attempt<=3;attempt++){
    /* ★ 저장 직전 최신 데이터 반드시 로드 */
    const latest=await cloudLoad();

    if(latest===null){
      /* 네트워크/서버 오류 → 재시도 */
      if(attempt<3){
        await new Promise(r=>setTimeout(r,1000*attempt));
        continue;
      }
      setLoading(false);
      showToast("⚠️ 저장 전 데이터 로드 실패. 네트워크 확인 후 재시도하세요.",false);
      return;
    }

    let base;
    if(Array.isArray(latest)&&latest.length>0){
      base=latest;
    } else {
      /* 원격 빈 bin: 로컬 백업과 교차 확인 */
      const backup=loadBackup();
      if(backup&&backup.length>0){
        /* 클라우드가 비어 보이지만 로컬 백업 존재 → 백업 우선 사용 */
        base=backup;
        showToast("⚠️ 원격 저장소가 비어있음 - 로컬 백업 "+backup.length+"건을 기준으로 병합합니다.",false);
      } else {
        base=[]; /* 진짜 첫 저장 */
      }
    }

    /* 중복 id: 같은 id면 교체, 없으면 맨 앞에 추가 */
    const exists=base.some(r=>r.id===rec.id);
    const newRecs=exists
      ?[rec,...base.filter(r=>r.id!==rec.id)]
      :[rec,...base];

    const ok=await cloudSave(newRecs);
    if(!ok){
      if(attempt<3){ await new Promise(r=>setTimeout(r,1000*attempt)); continue; }
      setLoading(false);
      showToast("⚠️ 저장 실패. Master Key와 Bin ID를 확인해주세요.",false);
      return;
    }

    /* ★ 저장 후 검증: 실제로 내 레코드가 클라우드에 있는지 확인 */
    await new Promise(r=>setTimeout(r,600));
    const verify=await cloudLoad();
    if(verify&&Array.isArray(verify)&&verify.some(r=>r.id===rec.id)){
      S.records=verify;
      saveBackup(verify);
      setLoading(false);
      showToast("✅ 공유 저장소에 저장되었습니다!");
      return;
    }
    /* 검증 실패 (다른 사용자가 동시 저장했을 가능성) → 재시도 */
    if(attempt<3){ await new Promise(r=>setTimeout(r,800)); }
  }

  setLoading(false);
  showToast("⚠️ 저장 충돌이 발생했습니다. 다시 시도해주세요.",false);
}

/* 검색 결과 영역만 부분 업데이트 (한글 입력 중 포커스 유지) */
function renderFilteredList(){
  const container=document.getElementById("record-list-area");
  if(!container){render();return;}
  const configured=isConfigured();
  const filteredIdx=S.records.map((_,i)=>i).filter(i=>{
    const rec=S.records[i];
    const rj=judge(rec.earned,rec.total,rec.clType);
    const result=rec.header.적합여부||rj;
    const sh=S.search;
    if(sh.업소명&&!((rec.header.업소명||"").includes(sh.업소명))) return false;
    if(sh.심사자&&!((rec.header.심사자||"").includes(sh.심사자))) return false;
    if(sh.유형&&rec.clType!==sh.유형) return false;
    if(sh.적합여부&&result!==sh.적합여부) return false;
    if(sh.날짜from&&rec.header.심사일자<sh.날짜from) return false;
    if(sh.날짜to&&rec.header.심사일자>sh.날짜to) return false;
    return true;
  });
  const isFiltered=S.search.업소명||S.search.심사자||S.search.유형||S.search.적합여부||S.search.날짜from||S.search.날짜to;
  let html="";
  if(isFiltered) html+=`<div class="search-result-info">🔎 검색 결과: <strong>${filteredIdx.length}건</strong> / 전체 ${S.records.length}건</div>`;
  if(S.records.length===0){
    html+=`<div class="empty"><div style="font-size:44px;margin-bottom:14px">📭</div><div>아직 저장된 기록이 없습니다.</div>${!configured?`<div style="font-size:12px;margin-top:8px;color:#e65100">⚙️ 설정에서 JSONBin 정보를 먼저 입력해주세요.</div>`:""}</div>`;
  } else if(filteredIdx.length===0){
    html+=`<div class="empty"><div style="font-size:44px;margin-bottom:14px">🔍</div><div>검색 조건에 맞는 기록이 없습니다.</div><div style="font-size:12px;margin-top:7px;color:#90a4ae">필터를 변경하거나 초기화해 보세요.</div></div>`;
  } else {
    html+=filteredIdx.map(i=>{
      const rec=S.records[i];
      const rj=judge(rec.earned,rec.total,rec.clType);
      const icon=rec.clType==="cgmp"?"💄":rec.clType==="haccp_g"?"🍱":"🥘";
      const resultVal=rec.header.적합여부||rj;
      return `<div class="rcard" onclick="viewRec(${i})">
        <div style="font-size:26px">${icon}</div>
        <div class="rmeta">
          <div class="rtl">${TYPES[rec.clType]?.label}${rec.header.업소명?` · ${esc(rec.header.업소명)}`:""}</div>
          <div class="rinfo">${rec.header.심사일자} · 심사자: ${esc(rec.header.심사자)||"-"} · ${esc(rec.header.소재지)||"-"}</div>
          <div class="rdate">저장: ${new Date(rec.savedAt).toLocaleString("ko-KR")}</div>
        </div>
        <div class="rscore">
          <div class="rpct">${pct(rec.earned,rec.total)}%</div>
          <div style="font-size:11px;color:#78909c">${rec.earned}/${rec.total}점</div>
          <span class="sbadge ${badgeCls(resultVal)}" style="font-size:11px;margin-top:3px;display:inline-block">${resultVal}</span>
        </div>
        <button class="btn-sm" onclick="event.stopPropagation();delRec(${i})">삭제</button>
      </div>`;
    }).join("");
  }
  container.innerHTML=html;
}

/* 한글 IME 대응: 조합 완료 후에만 필터 적용 */
function attachSearchListeners(){
  ["업소명","심사자"].forEach(key=>{
    const el=document.getElementById("sf-"+key);
    if(!el)return;
    let composing=false;

    el.addEventListener("compositionstart",()=>{ composing=true; });

    el.addEventListener("compositionend",(e)=>{
      composing=false;
      S.search[key]=e.target.value;
      renderFilteredList();
    });

    el.addEventListener("input",(e)=>{
      /* 한글 조합 중이면 상태만 업데이트, 재렌더 X */
      if(composing){ S.search[key]=e.target.value; return; }
      S.search[key]=e.target.value;
      renderFilteredList();
    });

    el.addEventListener("keydown",(e)=>{
      if(e.key==="Escape"){ el.value=""; S.search[key]=""; renderFilteredList(); }
    });
  });
}

/* -- Excel 내보내기 -- */
function getBp(it,J){
  var s=J?J[it.id+'_bp']:undefined;
  if(s!==undefined&&s!=='')return Number(s);
  if(it.배점!==null&&it.배점!==undefined)return Number(it.배점);
  return 0;
}
function exportToExcel(clTypeKey,J,hdr){
  J=J||{}; hdr=hdr||{};
  var ct=TYPES[clTypeKey];
  var subType=clTypeKey==='cgmp'?(hdr.평가유형서브||'CGMP 제조사'):
              clTypeKey==='haccp_g'?(hdr.평가유형서브||'일반 HACCP'):
              clTypeKey==='haccp_s'?(hdr.평가유형서브||'농산물'):'';
  var sc=calcScores(ct.data,J);

  var wb=new ExcelJS.Workbook();
  wb.creator='SK스토아 QA'; wb.created=new Date();
  var ws=wb.addWorksheet(ct.title.substring(0,28).replace(/[\/\\\?\*\[\]]/g,'_'));

  /* 열 너비 */
  ws.columns=[
    {width:18},{width:5},{width:65},{width:3},{width:3},
    {width:7},{width:7},{width:38}
  ];

  /* 색상 상수 */
  var NAVY='0F2547', GOLD='E8C872', WHITE='FFFFFF';
  var LIGHTBLUE='E8EAF6', LIGHTYELLOW='FFF9C4', LIGHTGREEN='E3F2FD';
  var DARKGRAY='37474F', LIGHTGRAY='F5F5F5', CREAM='FFFFF0';

  function navyFill(){ return {type:'pattern',pattern:'solid',fgColor:{argb:'FF'+NAVY}}; }
  function fill(hex){ return {type:'pattern',pattern:'solid',fgColor:{argb:'FF'+hex}}; }
  function border(){
    var s={style:'thin',color:{argb:'FFBBBBBB'}};
    return {top:s,left:s,bottom:s,right:s};
  }
  function thickBorder(){
    var s={style:'medium',color:{argb:'FF'+NAVY}};
    return {top:s,left:s,bottom:s,right:s};
  }
  function font(bold,sz,colorHex){
    return {name:'Noto Sans KR',bold:bold||false,size:sz||10,color:{argb:'FF'+(colorHex||'000000')}};
  }
  function align(h,v,wrap){
    return {horizontal:h||'left',vertical:v||'top',wrapText:wrap!==false};
  }

  /* ── R1: 제목 ── */
  var r1=ws.addRow([ct.title,'','','','','','','','']);
  ws.mergeCells('A1:H1');
  r1.height=32;
  r1.getCell(1).fill=navyFill();
  r1.getCell(1).font=font(true,16,GOLD);
  r1.getCell(1).alignment=align('center','middle');
  r1.getCell(1).border={bottom:{style:'medium',color:{argb:'FF'+GOLD}}};

  ws.addRow([]); /* R2 빈행 */

  /* ── R3~R6: 기본정보 ── */
  var infoRows=[
    ['제조업자(업소명)',hdr.업소명||'','','','소 재 지',hdr.소재지||'','',''],
    ['점검일자',hdr.심사일자||'','','','점 검 자',hdr.심사자||'','',''],
    ['평가유형',subType,'','','적합여부',hdr.적합여부||'','',''],
  ];
  infoRows.forEach(function(data){
    var r=ws.addRow(data);
    r.height=18;
    [1,5].forEach(function(c){
      var cell=r.getCell(c);
      cell.fill=fill(LIGHTBLUE); cell.font=font(true,10,NAVY);
      cell.alignment=align('center','middle'); cell.border=border();
    });
    [2,6].forEach(function(c){
      var cell=r.getCell(c);
      cell.fill=fill(WHITE); cell.font=font(false,10);
      cell.alignment=align('left','middle'); cell.border=border();
    });
    ws.mergeCells(r.number,2,r.number,4);
    ws.mergeCells(r.number,6,r.number,8);
  });

  ws.addRow([]); /* 빈행 */

  /* ── 결과행 ── */
  var rResult=ws.addRow(['결과','□ 적합    □ 조건부적합    □ 부적합','','','','','','','']);
  ws.mergeCells(rResult.number,2,rResult.number,8);
  rResult.height=20;
  rResult.getCell(1).fill=navyFill(); rResult.getCell(1).font=font(true,11,GOLD);
  rResult.getCell(1).alignment=align('center','middle'); rResult.getCell(1).border=border();
  rResult.getCell(2).fill=fill(CREAM); rResult.getCell(2).font=font(false,11);
  rResult.getCell(2).alignment=align('left','middle'); rResult.getCell(2).border=border();

  ws.addRow([]); /* 빈행 */

  /* ── 테이블 헤더 ── */
  var rHdr1=ws.addRow(['평가 항목','NO','평가 내용','','','평가 점수','','비 고']);
  var rHdr2=ws.addRow(['','','','','','배점','점수','']);
  [rHdr1,rHdr2].forEach(function(r){
    r.height=18;
    for(var c=1;c<=8;c++){
      var cell=r.getCell(c);
      cell.fill=navyFill(); cell.font=font(true,11,WHITE);
      cell.alignment=align('center','middle',true); cell.border=border();
    }
  });
  ws.mergeCells(rHdr1.number,3,rHdr1.number,5);
  ws.mergeCells(rHdr1.number,6,rHdr1.number,7);
  ws.mergeCells(rHdr2.number,1,rHdr2.number,5);

  /* ── 데이터 행 ── */
  var rowNo=0; var isEven=false;
  ct.data.forEach(function(sec){
    /* 섹션 헤더 */
    var secTitle=sec.title+(sec.sub?' · '+sec.sub:'');
    var rSec=ws.addRow(['('+secTitle+')','','','','','','','','']);
    ws.mergeCells(rSec.number,1,rSec.number,8);
    rSec.height=20;
    rSec.getCell(1).fill=fill(DARKGRAY); rSec.getCell(1).font=font(true,11,GOLD);
    rSec.getCell(1).alignment=align('left','middle');
    rSec.getCell(1).border={bottom:{style:'medium',color:{argb:'FF'+GOLD}}};

    sec.items.forEach(function(it){
      rowNo++;
      var bp=getBp(it,J);
      var v=J[it.id];
      var score=(v!==undefined&&v!=='')?Math.min(Number(v),bp):'';
      var bpDisp=(J[it.id+'_bp']!==undefined&&J[it.id+'_bp']!=='')?J[it.id+'_bp']:(it.배점!==null&&it.배점!==undefined?it.배점:'');
      var note=J[it.id+'_note']||'';
      var contentText=(it.내용||'').replace(/\\n/g,'\n');
      isEven=!isEven;
      var bg=isEven?WHITE:LIGHTGRAY;

      var rData=ws.addRow([it.항목,rowNo,contentText,'','',bpDisp,v!==undefined&&v!==''?v:'','',note]);
      ws.mergeCells(rData.number,3,rData.number,5);
      rData.height=30;

      /* 항목명 셀 */
      var c1=rData.getCell(1);
      c1.fill=fill(LIGHTBLUE); c1.font=font(false,10,NAVY);
      c1.alignment=align('left','top',true); c1.border=border();

      /* NO 셀 */
      var c2=rData.getCell(2);
      c2.fill=fill(LIGHTBLUE); c2.font=font(false,10,NAVY);
      c2.alignment=align('center','top'); c2.border=border();

      /* 평가내용 셀 */
      var c3=rData.getCell(3);
      c3.fill=fill(bg); c3.font=font(false,10);
      c3.alignment=align('left','top',true); c3.border=border();

      /* 배점 셀 */
      var c6=rData.getCell(6);
      c6.fill=fill(LIGHTYELLOW); c6.font=font(true,10);
      c6.alignment=align('center','middle'); c6.border=border();

      /* 점수 셀 */
      var c7=rData.getCell(7);
      c7.fill=fill(LIGHTGREEN); c7.font=font(true,10);
      c7.alignment=align('center','middle'); c7.border=border();

      /* 비고 */
      var c8=rData.getCell(8);
      c8.fill=fill(bg); c8.font=font(false,10);
      c8.alignment=align('left','top',true); c8.border=border();
    });
  });

  /* ── 합계 행 ── */
  ws.addRow([]);
  var rTotal=ws.addRow(['종 합 총 점','','','','','총배점: '+sc.total,'취득: '+sc.earned,'달성률: '+(sc.total?((sc.earned/sc.total)*100).toFixed(1):0)+'%']);
  ws.mergeCells(rTotal.number,1,rTotal.number,5);
  ws.mergeCells(rTotal.number,7,rTotal.number,8);
  rTotal.height=24;
  for(var c=1;c<=8;c++){
    var tc=rTotal.getCell(c);
    tc.fill=navyFill(); tc.font=font(true,12,GOLD);
    tc.alignment=align('center','middle');
    tc.border={top:{style:'medium',color:{argb:'FF'+GOLD}},left:border().left,right:border().right,bottom:border().bottom};
  }

  /* ── 다운로드 ── */
  wb.xlsx.writeBuffer().then(function(buffer){
    var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    var date=(hdr.심사일자||today()).replace(/-/g,'');
    var biz=(hdr.업소명||clTypeKey).replace(/[\/\\\?\*\[\]:]/g,'_').substring(0,20);
    a.download='QA평가_'+biz+'_'+date+'.xlsx';
    a.click();
    URL.revokeObjectURL(url);
  });
}

/* -- 헤더/비고 IME 대응 리스너 -- */
function attachHeaderListeners(){
  document.querySelectorAll('input[data-hk]').forEach(function(el){
    var key=el.getAttribute('data-hk');
    if(el.type==='date'){
      el.addEventListener('change',function(e){S.header[key]=e.target.value;render();});
      return;
    }
    el.addEventListener('input',function(e){S.header[key]=e.target.value;});
    el.addEventListener('blur',function(e){S.header[key]=e.target.value;render();});
  });
}
function attachNoteListeners(){
  /* 기타 사항 textarea: input→상태저장, blur→요약만 갱신 (DOM 재생성 없음) */
  var etcEl=document.querySelector('textarea[data-etc-text]');
  if(etcEl){
    etcEl.addEventListener('input',function(e){
      S.J['기타_텍스트']=e.target.value;
    });
    /* blur: 상태만 확실히 저장 (render 안 함 - 포커스 이탈 시 내용 유지) */
    etcEl.addEventListener('blur',function(e){
      S.J['기타_텍스트']=e.target.value;
    });
  }

  /* 비고 textarea: input→상태저장, blur→요약 섹션만 갱신 */
  document.querySelectorAll('textarea[data-note-id]').forEach(function(el){
    var id=el.getAttribute('data-note-id');
    el.addEventListener('input',function(e){
      S.J[id+'_note']=e.target.value;
    });
    el.addEventListener('blur',function(e){
      S.J[id+'_note']=e.target.value;
      /* 부적합 요약 섹션만 갱신 (전체 render 하지 않음) */
      refreshSummaryOnly();
    });
  });
}

/* 부적합 요약 섹션만 갱신 (전체 render 없이) */
function refreshSummaryOnly(){
  var ct=S.clType?TYPES[S.clType]:null;
  if(!ct) return;
  var summaryEl=document.querySelector('.summary-card');
  if(summaryEl){
    var tmp=document.createElement('div');
    tmp.innerHTML=renderSummary(ct.data,S.J);
    if(tmp.firstChild) summaryEl.replaceWith(tmp.firstChild);
    /* 교체 후 리스너 재부착 불필요 (summary는 클릭 인터랙션 없음) */
  }
}

function importBackupJSON(){
  document.getElementById("backup-file-input").click();
}
async function handleBackupFile(event){
  const file=event.target.files[0];
  if(!file)return;
  try{
    const text=await file.text();
    const parsed=JSON.parse(text);
    let records=null;
    if(Array.isArray(parsed)) records=parsed;
    else if(parsed&&Array.isArray(parsed.records)) records=parsed.records;
    if(!records||records.length===0){showToast("⚠️ 유효한 기록이 없는 파일입니다.",false);return;}
    if(!confirm("JSON 백업에서 "+records.length+"건을 불러와 클라우드에 복구하시겠습니까?\n기존 클라우드 데이터는 덮어씁니다."))return;
    setLoading(true);
    const ok=await cloudSave(records);
    setLoading(false);
    if(ok){
      S.records=records; saveBackup(records); render();
      showToast("✅ JSON 백업 "+records.length+"건을 클라우드에 복구했습니다!");
    } else {
      showToast("⚠️ 클라우드 저장 실패. 네트워크를 확인하세요.",false);
    }
  }catch(e){showToast("⚠️ 파일 읽기 오류: "+e.message,false);}
  event.target.value="";
}

async function doRefresh(){
  if(!isConfigured()){showToast("⚠️ 공유 저장소가 설정되지 않았습니다.",false);return;}
  setLoading(true);
  const recs=await cloudLoad();
  setLoading(false);
  if(recs===null){
    showToast("⚠️ 불러오기 실패 - 설정을 확인해주세요.",false);
  } else if(recs.length===0){
    const backup=loadBackup();
    if(backup&&backup.length>0){
      S.records=backup; render();
      showToast("📦 원격 저장소 비어있음 → 로컬 백업 "+backup.length+"건 복구 중...");
      setLoading(true);
      const ok=await cloudSave(backup);
      setLoading(false);
      if(ok){ saveBackup(backup); showToast("✅ 로컬 백업 "+backup.length+"건을 클라우드에 복구했습니다!"); }
      else{ showToast("⚠️ 로컬 백업은 표시되지만 클라우드 재저장 실패. 네트워크를 확인하세요.",false); }
    } else {
      showToast("📭 저장된 기록이 없습니다.");
    }
  } else {
    S.records=recs; render();
    showToast("🔄 최신 기록 "+recs.length+"건을 불러왔습니다.");
  }
}

function editRec(i){
  var rec=S.records[i];
  S.clType=rec.clType;
  S.header={...rec.header};
  S.J={...rec.J};
  S.editIdx=i;
  S.view="checklist";
  render();
}
function viewRec(i){S.selRec=S.records[i];S.selRecIdx=i;S.view="detail";render();}

async function delRec(i){
  if(!confirm("이 기록을 삭제하시겠습니까?\n공유 저장소에서 모든 사용자에게 삭제됩니다."))return;
  const recToDelete=S.records[i];
  if(!recToDelete)return;
  setLoading(true);
  /* ★ 삭제 전 최신 데이터 반드시 로드 (다른 사용자 기록 보호) */
  const latest=await cloudLoad();
  if(latest===null){
    setLoading(false);
    showToast("⚠️ 삭제 전 데이터 로드 실패. 네트워크 확인 후 재시도하세요.",false);
    return;
  }
  const base=Array.isArray(latest)&&latest.length>0?latest:S.records;
  const newRecs=base.filter(r=>r.id!==recToDelete.id);
  await cloudSave(newRecs);
  S.records=newRecs;
  saveBackup(newRecs);
  setLoading(false);
  render();
  showToast("🗑 삭제되었습니다.");
}

function saveCfgModal(){
  cfg.masterKey=document.getElementById("inp-key").value.trim();
  cfg.binId=document.getElementById("inp-bin").value.trim();
  saveCfg();
  S.showModal=false;
  render();
  showToast("✅ 설정이 저장되었습니다! 새로고침 버튼으로 기록을 불러오세요.");
}

async function testConnection(){
  const key=document.getElementById("inp-key").value.trim();
  const bin=document.getElementById("inp-bin").value.trim();
  if(!key||!bin){showToast("⚠️ Master Key와 Bin ID를 모두 입력해주세요.",false);return;}
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${bin}/latest`,{headers:{"X-Master-Key":key}});
    if(r.ok){showToast("✅ 연결 성공! 저장 버튼을 클릭해 설정을 저장하세요.");}
    else{showToast(`⚠️ 연결 실패 (${r.status}). Key와 Bin ID를 확인해주세요.`,false);}
  }catch(_){showToast("⚠️ 연결 실패. 인터넷 연결을 확인해주세요.",false);}
}


/* ── 브라우저 뒤로가기 지원 ── */
function pushState(view, clType, editIdx){
  var state={view:view, clType:clType||null, editIdx:editIdx||null};
  var url='#'+view+(clType?'/'+clType:'');
  history.pushState(state, '', url);
}
window.addEventListener('popstate', function(e){
  if(e.state){
    S.view=e.state.view||'home';
    S.clType=e.state.clType||null;
    if(S.view==='home'){S.clType=null;}
    render();
  } else {
    S.view='home'; render();
  }
});

/* ════════════════════════════════════════
   초기화
════════════════════════════════════════ */
(async()=>{
  render();
  if(isConfigured()){
    setLoading(true);
    const recs=await cloudLoad();
    setLoading(false);
    if(Array.isArray(recs)&&recs.length>0){
      S.records=recs; render();
    } else {
      /* 원격 실패 또는 빈 bin → localStorage 백업에서 복구 후 클라우드에 재저장 */
      const backup=loadBackup();
      if(backup&&backup.length>0){
        S.records=backup; render();
        showToast("📦 로컬 백업 "+backup.length+"건 발견 → 클라우드 복구 중...");
        cloudSave(backup).then(ok=>{
          if(ok){ saveBackup(backup); showToast("✅ 로컬 백업 "+backup.length+"건이 클라우드에 복구되었습니다!"); }
          else{ showToast("⚠️ 로컬 백업을 표시합니다. 클라우드 재저장은 실패했습니다.",false); }
        });
      }
    }
  }
  /* 30초마다 자동 갱신 */
  setInterval(async()=>{
    if(S.view==="records"&&isConfigured()){
      const recs=await cloudLoad();
      /* null=에러→무시, 빈배열→기존유지, 데이터있음→업데이트 */
      if(Array.isArray(recs)&&recs.length>0){
        S.records=recs; render();
      }
      /* recs===null: 네트워크 오류 등 → 기존 S.records 그대로 유지 */
    }
  },30000);
})();
</script>
